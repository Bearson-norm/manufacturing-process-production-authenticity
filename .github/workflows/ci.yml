name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - staging
      - develop
      - '**'
  pull_request:
    branches:
      - main
      - master
      - staging

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json
          server/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install client dependencies
      run: cd client && npm ci

    - name: Install server dependencies
      run: cd server && npm ci

    - name: Server unit tests
      run: cd server && npm test
      env:
        NODE_ENV: development
        JWT_SECRET: ci-test-jwt-secret
        ADMIN_PASSWORD: ci-admin-pass
        PRODUCTION_PASSWORD: ci-prod-pass

    - name: Server npm audit (high+)
      run: cd server && npm audit --omit=dev --audit-level=high

    - name: Client unit tests
      run: cd client && npm test -- --watchAll=false
      env:
        CI: true

    - name: Client build
      run: cd client && npm run build

    - name: Server syntax check
      run: cd server && node --check index.js && node --check app.js

    - name: Verify health endpoint exists
      run: |
        grep -q "app.get('/health'" server/app.js
        echo "✅ Health endpoint found in server/app.js"
