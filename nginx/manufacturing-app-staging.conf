# Nginx configuration for Manufacturing Process Staging
# Backend: http://127.0.0.1:3467
# Adjust server_name to your staging hostname

server {
    listen 80;
    listen [::]:80;
    server_name staging-mpr.moof-set.web.id;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;
    client_body_buffer_size 128k;

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    root /home/foom/deployments/manufacturing-app-staging/client-build;
    index index.html;

    access_log /var/log/nginx/manufacturing-app-staging-access.log;
    error_log /var/log/nginx/manufacturing-app-staging-error.log;

    location = /health {
        proxy_pass http://127.0.0.1:3467/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3467/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api {
        proxy_pass http://127.0.0.1:3467;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering on;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
